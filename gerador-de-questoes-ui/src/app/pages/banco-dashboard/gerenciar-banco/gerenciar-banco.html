<div class="container">
  <header>
    <h1>Gerenciar Banco de Questões</h1>
    <p class="subtitle">Visualize, edite ou exclua suas questões cadastradas.</p>
  </header>

  <div *ngIf="isLoading">Carregando...</div>

  <!-- LISTA DE CARDS -->
  <div class="grid-questoes" *ngIf="!isLoading">
    
    <div class="card-questao" *ngFor="let q of questoes">
      <div class="card-header">
        <span class="badge-tipo">{{ q.tipo }}</span>
        <span class="badge-topico">{{ q.topico }}</span>
      </div>
      
      <p class="enunciado-resumo">{{ q.enunciado }}</p>

      <div class="area-alternativas-preview" 
           *ngIf="q.tipo === 'MULTIPLA_ESCOLHA_4' || q.tipo === 'MULTIPLA_ESCOLHA_5'">
        <ul>
          <!-- Itera sobre as chaves (a, b, c, d...) -->
          <li *ngFor="let key of objectKeys(q.alternativas)">
            <strong>{{ key | uppercase }})</strong> {{ q.alternativas[key] }}
          </li>
        </ul>
      </div>
      
      <div class="card-actions">
        <button class="btn-editar" (click)="onAbrirEdicao(q)">Editar</button>
        <button class="btn-excluir" (click)="onExcluir(q.id)">Excluir</button>
      </div>
    </div>

    <div *ngIf="questoes.length === 0" class="empty-state">
      Nenhuma questão cadastrada ainda.
    </div>
  </div>
</div>

<!-- MODAL DE EDIÇÃO -->
<div class="modal-overlay" *ngIf="isEditModalOpen && questaoEmEdicao">
  <div class="modal-box">
    <h3>Editar Questão</h3>
    
    <div class="form-modal">
      <!-- Tópico -->
      <div class="form-group">
        <label>Tópico:</label>
        <input [(ngModel)]="questaoEmEdicao.topico" type="text">
      </div>

      <!-- Enunciado -->
      <div class="form-group">
        <label>Enunciado:</label>
        <textarea [(ngModel)]="questaoEmEdicao.enunciado" rows="4"></textarea>
      </div>

      <!-- ALTERNATIVAS (Só se não for Discursiva) -->
      <div *ngIf="questaoEmEdicao.tipo !== 'DISCURSIVA'" class="area-alternativas">
        <h4>Alternativas</h4>
        <!-- Loop inteligente pelas chaves do Map (a, b, c, d) -->
        <div class="input-group" *ngFor="let key of objectKeys(questaoEmEdicao.alternativas)">
          <span class="prefixo">{{ key | uppercase }})</span>
          <input [(ngModel)]="questaoEmEdicao.alternativas[key]" type="text">
        </div>
      </div>

      <!-- GABARITO -->
      <div class="form-group">
        <label>Resposta Correta:</label>
        
        <!-- Se for Discursiva, usa Textarea -->
        <textarea *ngIf="questaoEmEdicao.tipo === 'DISCURSIVA'" 
                  [(ngModel)]="questaoEmEdicao.respostaCorreta" rows="4"></textarea>
        
        <!-- Se não, usa Input simples (ou poderia ser Select) -->
        <input *ngIf="questaoEmEdicao.tipo !== 'DISCURSIVA'" 
               [(ngModel)]="questaoEmEdicao.respostaCorreta" type="text">
      </div>
    </div>

    <div class="modal-buttons">
      <button class="btn-cancelar" (click)="onCancelarEdicao()">Cancelar</button>
      <button class="btn-salvar" (click)="onSalvarEdicao()">Salvar Alterações</button>
    </div>
  </div>
</div>

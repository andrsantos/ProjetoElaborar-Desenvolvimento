spring.application.name=GeradorDeQuestoes
#--- CHAVE DE API DA OPEN AI ---#
spring.ai.openai.api-key=${OPENAI_API_KEY}
#--- CONFIGURAÇÕES DA OPENAI ---#
spring.ai.openai.chat.options.model=gpt-5.4-mini
spring.ai.openai.embedding.options.model=text-embedding-ada-002

# --- CONFIGURAÇÕES DO CLAUDE ---#
spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY}
spring.ai.anthropic.chat.options.model=claude-haiku-4-5-20251001
spring.ai.anthropic.chat.options.max-tokens=4096
# --- Configuração do Banco de Dados (PostgreSQL + PGVector) ---
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
# --- Configuração do JPA (Hibernate) ---
# "update" é ótimo para desenvolvimento. Ele atualiza o schema do banco.
spring.jpa.hibernate.ddl-auto=update
#----- Configurações do PGVector -----#
spring.ai.vectorstore.pgvector.enabled=true
spring.ai.vectorstore.pgvector.table-name=vector_store
spring.ai.vectorstore.pgvector.dimension=1536
# Define o tamanho máximo de um único arquivo
spring.servlet.multipart.max-file-size=50MB
# Define o tamanho máximo total da requisição (arquivo + campos de texto)
spring.servlet.multipart.max-request-size=50MB
spring.ai.openai.chat.options.temperature=0.7
spring.ai.openai.chat.options.presence-penalty=0.6
spring.ai.openai.chat.options.frequency-penalty=0.5